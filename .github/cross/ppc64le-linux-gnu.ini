# Meson cross-file for PPC64LE cross-compilation on Ubuntu
# Uses the gcc-powerpc64le-linux-gnu cross-compiler toolchain

[binaries]
c = 'powerpc64le-linux-gnu-gcc'
cpp = 'powerpc64le-linux-gnu-g++'
ar = 'powerpc64le-linux-gnu-ar'
strip = 'powerpc64le-linux-gnu-strip'
pkgconfig = 'pkg-config'

[built-in options]
c_args = []
cpp_args = []
c_link_args = []
cpp_link_args = []

[host_machine]
system = 'linux'
cpu_family = 'ppc64'
cpu = 'power8'
endian = 'little'

[properties]
# pkg-config should search ppc64el paths
pkg_config_libdir = ['/usr/lib/powerpc64le-linux-gnu/pkgconfig', '/usr/share/pkgconfig']
