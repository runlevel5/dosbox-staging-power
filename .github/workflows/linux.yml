name: PPC64LE build
permissions: read-all

on:
  push:
    paths-ignore:
      - '.clang-format'
      - '.mdl-styles'
      - '*.md'
      - 'docs/**'
      - 'licenses/**'
      - 'website/**'

  pull_request:
    paths-ignore:
      - '.clang-format'
      - '.mdl-styles'
      - '*.md'
      - 'docs/**'
      - 'licenses/**'
      - 'website/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_ppc64le:
    name:    Cross-compile for PPC64LE
    runs-on: ubuntu-24.04
    if:      github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Add ppc64el architecture
        run: |
          sudo dpkg --add-architecture ppc64el
          sudo apt-get update

      - name: Install cross-compiler toolchain
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get install -y \
            gcc-powerpc64le-linux-gnu \
            g++-powerpc64le-linux-gnu \
            meson \
            ninja-build \
            pkg-config \
            python3-setuptools \
            ccache

      - name: Install ppc64el dev libraries
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get install -y \
            libasound2-dev:ppc64el \
            libatomic1:ppc64el \
            libfluidsynth-dev:ppc64el \
            libopusfile-dev:ppc64el \
            libpng-dev:ppc64el \
            libsdl2-dev:ppc64el \
            libsdl2-net-dev:ppc64el \
            libslirp-dev:ppc64el \
            libspeexdsp-dev:ppc64el \
            libavcodec-dev:ppc64el \
            libavutil-dev:ppc64el \
            libswscale-dev:ppc64el \
            libavformat-dev:ppc64el \
            libswresample-dev:ppc64el \
            libsamplerate0-dev:ppc64el

      - name: Log environment
        run: |
          echo "=== Cross-compiler ==="
          powerpc64le-linux-gnu-gcc --version
          echo "=== Meson ==="
          meson --version
          echo "=== Ninja ==="
          ninja --version
          echo "=== pkg-config ppc64el paths ==="
          ls /usr/lib/powerpc64le-linux-gnu/pkgconfig/ || true

      - name: Setup Meson cross-build
        run: |
          meson setup build \
            --cross-file .github/cross/ppc64le-linux-gnu.ini \
            -Dbuildtype=release \
            -Ddefault_library=static

      - name: Build
        run: |
          set -o pipefail
          ninja -C build 2>&1 | tee build.log

      - name: Verify dynrec config
        run: |
          echo "=== Checking dosbox_config.h ==="
          grep 'C_TARGETCPU' build/dosbox_config.h
          grep 'C_TARGET_CPU_PPC64LE' build/dosbox_config.h
          grep 'C_DYNREC' build/dosbox_config.h
          echo "=== Binary architecture ==="
          file build/dosbox

      - name: Summarize warnings
        env:
          MAX_WARNINGS: 0
        run: python3 ./scripts/ci/count-warnings.py -lf build.log
